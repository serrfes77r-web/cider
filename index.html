        html,
        body {
            height: 100%;
            width: 100%;
            background-color: var(--bg-body);
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        #splashOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #f5edff 0%, #e8d5f8 15%, #dcc8f2 30%, #ede0f9 50%, #f3e8fc 65%, #e5d2f6 80%, #f0e3fa 100%);
            background-size: 400% 400%;
            animation: splashBgShift 12s ease-in-out infinite;
            overflow: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: opacity, transform;
        }
        #splashOverlay.exit {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }
        #splashOverlay.hidden-splash {
            display: none;
        }
        @keyframes splashBgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }
        .splash-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(180, 140, 220, 0.7);
            box-shadow: 0 0 6px rgba(180, 140, 220, 0.5), 0 0 14px rgba(200, 160, 235, 0.35);
            animation: particleFloat linear infinite;
            will-change: transform, opacity;
        }
        @keyframes particleFloat {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.3);
                opacity: 0;
            }
            8% {
                opacity: 0.9;
            }
            40% {
                opacity: 0.7;
                transform: translateY(40vh) translateX(30px) scale(1);
            }
            70% {
                opacity: 0.35;
                transform: translateY(-10vh) translateX(-20px) scale(0.6);
            }
            100% {
                transform: translateY(-30vh) translateX(15px) scale(0.15);
                opacity: 0;
            }
        }
        .wheel-of-fate {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            z-index: 2;
            margin-bottom: 8px;
        }
        .wheel-ring-outer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(150, 110, 195, 0.55);
            box-shadow: 0 0 28px rgba(160, 120, 210, 0.4), 0 0 60px rgba(180, 140, 225, 0.22), inset 0 0 20px rgba(170, 130, 215, 0.1);
            animation: ringRotateCW 10s linear infinite;
        }
        .wheel-ring-middle {
            position: absolute;
            top: 22px;
            left: 22px;
            width: calc(100% - 44px);
            height: calc(100% - 44px);
            border-radius: 50%;
            border: 2.5px dashed rgba(170, 130, 210, 0.5);
            box-shadow: 0 0 18px rgba(170, 130, 215, 0.3);
            animation: ringRotateCCW 7s linear infinite;
        }
        .wheel-ring-inner {
            position: absolute;
            top: 48px;
            left: 48px;
            width: calc(100% - 96px);
            height: calc(100% - 96px);
            border-radius: 50%;
            border: 2px solid rgba(190, 150, 225, 0.6);
            box-shadow: 0 0 22px rgba(185, 145, 220, 0.5), 0 0 40px rgba(195, 155, 230, 0.25);
            animation: ringRotateCW 4.5s linear infinite;
        }
        .wheel-cross {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 90px;
            transform: translate(-50%, -50%);
            animation: crossRotate 20s linear infinite;
            pointer-events: none;
        }
        .wheel-cross::before,
        .wheel-cross::after {
            content: '';
            position: absolute;
            background: rgba(195, 155, 230, 0.5);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(195, 155, 230, 0.6);
        }
        .wheel-cross::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        .wheel-cross::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        .wheel-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, #e8d4f8 30%, #c8a8e8 70%, transparent 100%);
            box-shadow: 0 0 18px rgba(210, 170, 240, 0.9), 0 0 40px rgba(190, 150, 220, 0.55), 0 0 70px rgba(170, 130, 210, 0.3);
            animation: corePulse 2.5s ease-in-out infinite;
            z-index: 3;
        }
        @keyframes ringRotateCW {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes ringRotateCCW {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }
        @keyframes crossRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        @keyframes corePulse {
            0%,
            100% {
                box-shadow: 0 0 18px rgba(210, 170, 240, 0.9), 0 0 40px rgba(190, 150, 220, 0.55), 0 0 70px rgba(170, 130, 210, 0.3);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 28px rgba(220, 185, 248, 1), 0 0 55px rgba(200, 160, 230, 0.7), 0 0 90px rgba(180, 140, 220, 0.45);
                transform: translate(-50%, -50%) scale(1.25);
            }
        }
        .orbit-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(210, 175, 235, 0.85);
            box-shadow: 0 0 8px rgba(200, 160, 230, 0.7);
            pointer-events: none;
        }
        .orbit-dot:nth-child(1) {
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: dotBlink1 3s ease-in-out infinite;
        }
        .orbit-dot:nth-child(2) {
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: dotBlink2 3.5s ease-in-out infinite;
        }
        .orbit-dot:nth-child(3) {
            top: 50%;
            right: 6px;
            transform: translateY(-50%);
            animation: dotBlink3 4s ease-in-out infinite;
        }
        .orbit-dot:nth-child(4) {
            top: 50%;
            left: 6px;
            transform: translateY(-50%);
            animation: dotBlink4 3.2s ease-in-out infinite;
        }
        .orbit-dot:nth-child(5) {
            top: 18px;
            right: 22px;
            animation: dotBlink1 3.8s ease-in-out infinite;
        }
        .orbit-dot:nth-child(6) {
            bottom: 18px;
            left: 22px;
            animation: dotBlink2 4.2s ease-in-out infinite;
        }
        .orbit-dot:nth-child(7) {
            top: 18px;
            left: 22px;
            animation: dotBlink3 3.4s ease-in-out infinite;
        }
        .orbit-dot:nth-child(8) {
            bottom: 18px;
            right: 22px;
            animation: dotBlink4 3.9s ease-in-out infinite;
        }
        @keyframes dotBlink1 {
            0%,
            100% {
                opacity: 0.5;
                transform: translateX(-50%) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.5);
            }
        }
        @keyframes dotBlink2 {
            0%,
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.6);
            }
        }
        @keyframes dotBlink3 {
            0%,
            100% {
                opacity: 0.45;
                transform: translateY(-50%) scale(0.7);
            }
            50% {
                opacity: 1;
                transform: translateY(-50%) scale(1.4);
            }
        }
        @keyframes dotBlink4 {
            0%,
            100% {
                opacity: 0.55;
                transform: translateY(-50%) scale(0.9);
            }
            50% {
                opacity: 1;
                transform: translateY(-50%) scale(1.5);
            }
        }
        .waves-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .wave {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            border-radius: 42% 46% 48% 44%;
            opacity: 0.5;
            will-change: transform;
        }
        .wave-1 {
            background: rgba(170, 130, 210, 0.35);
            animation: waveDrift 8s ease-in-out infinite;
            height: 160px;
            bottom: -20px;
            border-radius: 44% 48% 42% 46%;
        }
        .wave-2 {
            background: rgba(185, 145, 220, 0.3);
            animation: waveDrift 10s ease-in-out infinite reverse;
            height: 130px;
            bottom: -15px;
            border-radius: 46% 42% 48% 44%;
        }
        .wave-3 {
            background: rgba(195, 160, 228, 0.28);
            animation: waveDrift 7s ease-in-out infinite;
            height: 100px;
            bottom: -8px;
            border-radius: 43% 47% 45% 43%;
        }
        .wave-4 {
            background: rgba(210, 175, 235, 0.22);
            animation: waveDrift 9.5s ease-in-out infinite reverse;
            height: 70px;
            bottom: 0;
            border-radius: 47% 43% 44% 46%;
        }
        @keyframes waveDrift {
            0% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(3%) translateY(-6px);
            }
            50% {
                transform: translateX(-2%) translateY(2px);
            }
            75% {
                transform: translateX(4%) translateY(-4px);
            }
            100% {
                transform: translateX(0) translateY(0);
            }
        }
        .splash-title {
            position: relative;
            z-index: 3;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #5c3d7e;
            text-align: center;
            margin-top: 6px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #6b4d8a, #8b6aaf, #6b4d8a, #9b7bc0, #6b4d8a);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGradient 4s ease-in-out infinite, titleFloat 3.5s ease-in-out infinite;
            text-shadow: none;
            filter: drop-shadow(0 2px 8px rgba(150, 110, 190, 0.35));
            will-change: transform;
        }
        @keyframes titleGradient {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        @keyframes titleFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {

    <script>
        /* ========= 图片 IndexedDB 存储层 ========= */
        const IMG_DB_NAME = 'xiayi_img_db';
        const IMG_DB_VERSION = 1;
        const IMG_STORE_NAME = 'images';
        const IMG_ID_PREFIX = '__IMG_ID__';

        function openImgDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(IMG_DB_NAME, IMG_DB_VERSION);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(IMG_STORE_NAME)) {
                        db.createObjectStore(IMG_STORE_NAME, { keyPath: 'id' });
                    }
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            });
        }
        async function saveImageToDB(id, base64) {
            if (!base64 || typeof base64 !== 'string') return;
            if (!base64.startsWith('data:') && !base64.startsWith('__IMG_ID__')) return;
            const db = await openImgDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(IMG_STORE_NAME, 'readwrite');
                tx.objectStore(IMG_STORE_NAME).put({ id, base64 });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }
        async function getImageFromDB(id) {
            const db = await openImgDB();
            return new Promise(resolve => {
                const tx = db.transaction(IMG_STORE_NAME, 'readonly');
                const req = tx.objectStore(IMG_STORE_NAME).get(id);
                req.onsuccess = () => resolve(req.result?.base64 || '');
                req.onerror = () => resolve('');
            });
        }
        async function deleteImageFromDB(id) {
            const db = await openImgDB();
            return new Promise(resolve => {
                const tx = db.transaction(IMG_STORE_NAME, 'readwrite');
                tx.objectStore(IMG_STORE_NAME).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => resolve();
            });
        }
        async function deleteMessageFromChat(msgId) {
            const msg = messages.find(m => m.id == msgId);
            if (msg) {
                if (msg.type === 'image' && isImgIdRef(msg.content)) {
                    const imgId = extractImgId(msg.content);
                    const usedInOtherMessages = messages.some(m =>
                        m.id != msgId && m.type === 'image' && extractImgId(m.content) === imgId
                    );
                    const usedInImgCards = imgCardList.some(card =>
                        extractImgId(card.url) === imgId
                    );
                    const customBg = localStorage.getItem(STORAGE.customBgImage);
                    const usedInBg = (customBg && extractImgId(customBg) === imgId);
                    const usedInMengAvatar = (profile.mengAvatar && extractImgId(profile.mengAvatar) === imgId);
                    const usedInMyAvatar = (profile.myAvatar && extractImgId(profile.myAvatar) === imgId);
                    const usedInMemberAvatar = groupMembers.some(m => m.avatar && extractImgId(m.avatar) === imgId);

                    if (!usedInOtherMessages && !usedInImgCards && !usedInBg && !usedInMengAvatar && !usedInMyAvatar &&
                        !usedInMemberAvatar) {
                        await deleteImageFromDB(imgId);
                    }
                }
                messages = messages.filter(m => m.id != msgId);
                saveMessagesImmediately();
                renderMessages();
            }
        }
        async function clearAllMessagesSafe() {
            const imgRefCount = new Map();
            for (const msg of messages) {
                if (msg.type === 'image' && isImgIdRef(msg.content)) {
                    const id = extractImgId(msg.content);
                    imgRefCount.set(id, (imgRefCount.get(id) || 0) + 1);
                }
            }
            for (const [imgId, count] of imgRefCount.entries()) {
                const usedInImgCards = imgCardList.some(card => extractImgId(card.url) === imgId);
                const customBg = localStorage.getItem(STORAGE.customBgImage);
                const usedInBg = (customBg && extractImgId(customBg) === imgId);
                const usedInMengAvatar = (profile.mengAvatar && extractImgId(profile.mengAvatar) === imgId);
                const usedInMyAvatar = (profile.myAvatar && extractImgId(profile.myAvatar) === imgId);
                const usedInMemberAvatar = groupMembers.some(m => m.avatar && extractImgId(m.avatar) === imgId);
                if (!usedInImgCards && !usedInBg && !usedInMengAvatar && !usedInMyAvatar && !usedInMemberAvatar) {
                    await deleteImageFromDB(imgId);
                }
            }
            messages = [];
            saveMessagesImmediately();
            renderMessages();
        }
        function isImgIdRef(url) { return url && typeof url === 'string' && url.startsWith(IMG_ID_PREFIX); }

        function extractImgId(url) { return isImgIdRef(url) ? url.substring(IMG_ID_PREFIX.length) : null; }
        async function resolveImageUrl(url) {
            if (isImgIdRef(url)) {
                const id = extractImgId(url);
                if (avatarCache.has(url)) return avatarCache.get(url);
                const base64 = await getImageFromDB(id);
                if (base64) avatarCache.set(url, base64);
                return base64 || url;
            }
            return url;
        }
        async function loadImgElement(imgEl, url) {
            if (!imgEl || !url) return;
            const realSrc = await resolveImageUrl(url);
            if (realSrc && imgEl.src !== realSrc) {
                imgEl.src = realSrc;
                imgEl.classList.remove('img-loading-placeholder');
            }
        }
        let imageObserver = null;

        function setupLazyImageObserver() {
            if ('IntersectionObserver' in window) {
                imageObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            const ref = img.getAttribute('data-img-ref');
                            if (ref) {
                                loadImgElement(img, ref).then(() => {
                                    img.removeAttribute('data-img-ref');
                                });
                            }
                            imageObserver.unobserve(img);
                        }
                    });
                }, { rootMargin: '200px' });
            }
        }
        async function resolveImgElementsInContainer(container) {
            if (!container) return;
            const imgs = container.querySelectorAll('img[data-img-ref]');
            for (const img of imgs) {
                if (imageObserver) {
                    imageObserver.observe(img);
                } else {
                    const ref = img.getAttribute('data-img-ref');
                    if (ref) await loadImgElement(img, ref);
                }
            }
        }

        function formatMsgTime(timestamp) {
            const d = new Date(timestamp);
            if (isNaN(d.getTime())) return '';
            const hh = d.getHours().toString().padStart(2, '0');
            const mm = d.getMinutes().toString().padStart(2, '0');
            const mon = (d.getMonth() + 1).toString().padStart(2, '0');
            const dd = d.getDate().toString().padStart(2, '0');
            const today = new Date();
            const msgDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const diffDays = Math.floor((todayDate - msgDate) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return `${hh}:${mm}`;
            if (diffDays === 1) return `昨天 ${hh}:${mm}`;
            if (diffDays < 7) return `${diffDays}天前 ${hh}:${mm}`;
            return `${mon}-${dd} ${hh}:${mm}`;
        }

        function calcStreakDays() {
            const dates = new Set();
            messages.forEach(m => {
                const d = new Date(m.timestamp);
                dates.add(d.toDateString());
            });
            const sortedDates = [...dates].map(d => new Date(d)).sort((a, b) => a - b);
            if (sortedDates.length === 0) return 0;
            let maxStreak = 1;
            let currentStreak = 1;
            for (let i = 1; i < sortedDates.length; i++) {
                const diff = Math.floor((sortedDates[i] - sortedDates[i - 1]) / (1000 * 60 * 60 * 24));
                if (diff === 1) {
                    currentStreak++;
                    maxStreak = Math.max(maxStreak, currentStreak);
                } else if (diff > 1) {
                    currentStreak = 1;
                }
            }
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            const lastDate = sortedDates[sortedDates.length - 1].toDateString();
            if (lastDate !== today && lastDate !== yesterday) {
                return 0;
            }
            return maxStreak;
        }

        function analyzeWordFrequency(senderFilter, topN = 10) {
            const wordCount = new Map();
            const targetMessages = messages.filter(m => {
                if (m.type !== 'text') return false;
                if (senderFilter === 'me') return m.sender === 'me';
                if (senderFilter === 'other') return m.sender !== 'me';
                return m.sender === senderFilter;
            });
            targetMessages.forEach(msg => {
                const text = (msg.content || '').trim();
                if (!text) return;
                const segments = text.split(/[，。！？、；：\s,\.!\?;:]+/);
                segments.forEach(seg => {
                    if (!seg || seg.length < 2) return;
                    const chars = Array.from(seg);
                    const len = chars.length;
                    for (let i = 0; i <= len - 2; i++) {
                        const bigram = chars[i] + chars[i + 1];
                        if (!STOP_WORDS.has(bigram) && !/^\d+$/.test(bigram)) {
                            wordCount.set(bigram, (wordCount.get(bigram) || 0) + 1);
                        }
                    }
                    for (let i = 0; i <= len - 3; i++) {
                        const trigram = chars[i] + chars[i + 1] + chars[i + 2];
                        if (!/^\d+$/.test(trigram)) {
                            wordCount.set(trigram, (wordCount.get(trigram) || 0) + 1);
                        }
                    }
                });
            });
            const sorted = [...wordCount.entries()].sort((a, b) => b[1] - a[1]).slice(0, topN);
            return { totalMessages: targetMessages.length, uniqueWords: wordCount.size, topWords: sorted };
        }

        function analyzeWordCardFrequency(senderFilter) {
            // 收集要统计的字卡句子
            let targetSentences = [];
            if (groupChatEnabled && senderFilter !== 'other' && senderFilter !== 'me') {

                if (senderFilter === 'other') return m.sender !== 'me' && m.sender !== 'system';
                return m.sender === senderFilter;
            });
        
            const freqMap = new Map();
            targetSentences.forEach(s => freqMap.set(s, 0));
            targetMessages.forEach(msg => {
                const text = msg.content || '';
                targetSentences.forEach(sentence => {
                    if (text.includes(sentence)) {
                        freqMap.set(sentence, (freqMap.get(sentence) || 0) + 1);
                    }
                });
            });
            const sorted = [...freqMap.entries()]
                .filter(([_, count]) => count > 0)
                .sort((a, b) => b[1] - a[1]);
        
            const topN = parseInt(document.getElementById('wfTopN')?.value || 10);
            const top = sorted.slice(0, topN);
            return {
                totalMessages: targetMessages.length,
                uniqueWords: sorted.length,
                topWords: top
            };
        }

        async function sendGroupReplies(forceQuoteMsg = null) {
            const activeMembers = getActiveMembers();
            if (activeMembers.length === 0) return;
            if (isTyping) return;

            if (patList.length > 0 && Math.random() < 0.03) {
                isTyping = true;
                const randomMember = activeMembers[Math.floor(Math.random() * activeMembers.length)];
                const patContent = patList[Math.floor(Math.random() * patList.length)];
                showTypingIndicator(true, '群成员正在输入...');
                const actualMax = Math.max(REPLY_MIN_DELAY_MS, replyMaxDelayMs);
                const delay = REPLY_MIN_DELAY_MS + Math.random() * (actualMax - REPLY_MIN_DELAY_MS);
                await new Promise(r => setTimeout(r, delay));
                showTypingIndicator(false);
                sendPatMessage(patContent, randomMember.id, false);
                markMyMessagesRead();
                isTyping = false;
                return;
            }

            isTyping = true;
            showTypingIndicator(true, '群成员正在输入...');
            const actualMax = Math.max(REPLY_MIN_DELAY_MS, replyMaxDelayMs);
            const delay = REPLY_MIN_DELAY_MS + Math.random() * (actualMax - REPLY_MIN_DELAY_MS);
            await new Promise(r => setTimeout(r, delay));
            showTypingIndicator(false);
            markMyMessagesRead();

            const replyMemberCount = Math.min(activeMembers.length, getWeightedReplyCount());
            const shuffled = [...activeMembers].sort(() => Math.random() - 0.5);
            const replyingMembers = shuffled.slice(0, replyMemberCount);

            for (let mi = 0; mi < replyingMembers.length; mi++) {
                const member = replyingMembers[mi];
                const wordCardCount = getWeightedReplyCount();

                let useQuote = null;
                if (mengQuoteEnabled) {
                    if (mi === 0 && forceQuoteMsg !== null) {
                        useQuote = forceQuoteMsg;
                    } else if (Math.random() < 0.2) {
                        const myMs = messages.filter(m => m.sender === 'me').slice(-10);
                        if (myMs.length) useQuote = myMs[Math.floor(Math.random() * myMs.length)];
                    }
                }

                if (combineRepliesEnabled && wordCardCount >= 2) {
                    const combinedContents = [];
                    for (let j = 0; j < wordCardCount; j++) {
                        combinedContents.push(getRandomReplyForMember(member).content);
                    }
                    const combinedText = combinedContents.join('\n');
                    addMessageWithSender(member.id, member.name, member.avatar || defaultAvatar(), combinedText, 'text', useQuote);
                    playSound('meng');
                
                    if (!emojiDisabled && emojiCardList.length > 0 && Math.random() < 0.2) {

                        addMessageWithSender(member.id, member.name, member.avatar || defaultAvatar(), randomEmoji, 'text', null);
                        playSound('meng');
                    }
                
                    if (!imgDisabled && imgCardList.length > 0 && Math.random() < 0.2) {
                        const validImgs = imgCardList.filter(img => img && img.url && img.url.trim());
                        if (validImgs.length > 0) {
                            await new Promise(r => setTimeout(r, replyInterMessageDelayMs));
                            const randomImg = validImgs[Math.floor(Math.random() * validImgs.length)];
                            addMessageWithSender(member.id, member.name, member.avatar || defaultAvatar(), null, 'image', null, randomImg.url);
                            playSound('meng');
                        }
                    }
                } else {
                    for (let j = 0; j < wordCardCount; j++) {
                        const { content } = getRandomReplyForMember(member);
                        const quote = (j === 0) ? useQuote : null;
                        addMessageWithSender(member.id, member.name, member.avatar || defaultAvatar(), content, 'text', quote);
                        playSound('meng');
                
                        if (!emojiDisabled && emojiCardList.length > 0 && Math.random() < 0.2) {
                            await new Promise(r => setTimeout(r, replyInterMessageDelayMs));
                            const randomEmoji = emojiCardList[Math.floor(Math.random() * emojiCardList.length)];
                            addMessageWithSender(member.id, member.name, member.avatar || defaultAvatar(), randomEmoji, 'text', null);
                            playSound('meng');
                        }
                
                        if (j < wordCardCount - 1) {
                            await new Promise(r => setTimeout(r, replyInterMessageDelayMs));
                        }
                    }
                
                    if (!imgDisabled && imgCardList.length > 0 && Math.random() < 0.2) {
                        const validImgs = imgCardList.filter(img => img && img.url && img.url.trim());
                        if (validImgs.length > 0) {

                            playSound('meng');

                }

        function isPureEmojiLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return false;
            const kaomojiPatterns = /^[\(（\[｢「【][^a-zA-Z0-9]{1,5}[\)）\]｣」】]$/;
            const emojiPattern = /^(\p{Extended_Pictographic}|\p{Emoji_Component}|\s|[\u200D\uFE0F])+$/u;
            const symbolOnly = /^[^\p{L}\p{N}]+$/u;
            return emojiPattern.test(trimmed) || symbolOnly.test(trimmed) || kaomojiPatterns.test(trimmed);
        }

        function extractAllStrings(obj) {
            const results = [];
            if (typeof obj === 'string') {
                results.push(obj);
            } else if (Array.isArray(obj)) {
                for (const item of obj) {
                    results.push(...extractAllStrings(item));
                }
            } else if (obj && typeof obj === 'object') {
                for (const val of Object.values(obj)) {
                    results.push(...extractAllStrings(val));
                }
            }
            return results;
        }

        function cleanLineQuotes(line) {
            let str = line.trim();
            while (str.length >= 2) {
                const first = str[0];
                const last = str[str.length - 1];
                const isDoubleQuote = (first === '"' && last === '"');
                const isSingleQuote = (first === "'" && last === "'");
                const isLeftRightQuote = (first === '“' && last === '”');
                if (isDoubleQuote || isSingleQuote || isLeftRightQuote) {
                    str = str.slice(1, -1).trim();
                } else {
                    break;
                }
            }
            return str;
        }
        function importAndAutoClassify(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                let lines = [];
                if (file.name.endsWith('.json')) {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        const candidates = extractAllStrings(parsed);
                        lines = candidates
                            .map(s => cleanLineQuotes(s).trim())
                            .filter(l => l);
                    } catch (err) { alert('JSON解析失败'); return; }
                } else {
                    lines = e.target.result.split(/\r?\n/)
                        .map(l => cleanLineQuotes(l).trim())
                        .filter(l => l);
                }
                const words = [],
                    emojis = [];
                lines.forEach(clean => {
                    if (isPureEmojiLine(clean)) emojis.push(clean);
                    else words.push(clean);
                });
                if (words.length) { wordCardList = [...wordCardList, ...words];
                    saveWordCards(); }
                if (emojis.length) { emojiCardList = [...emojiCardList, ...emojis];
                    saveEmojiCards(); }
                alert(`✅ 导入完成\n📝 字卡 +${words.length} 条\n😊 表情 +${emojis.length} 条`);
                const wordArea = document.getElementById('wordTextarea');
                if (wordArea) wordArea.value = wordCardList.join('\n');
                const emojiArea = document.getElementById('emojiTextarea');
                if (emojiArea) emojiArea.value = emojiCardList.join('\n');
                const countEl = document.getElementById('wordCountDisplay');
                if (countEl) countEl.innerHTML = `📝 当前 ${wordCardList.length} 条`;
            };
            reader.readAsText(file);
        }

                "信件内容需1~15句"); return false; }
            const delay = 2 + Math.random() * 3;
            const due = Date.now() + delay * 3600 * 1000;

                replyMessages: null, replyTime: null, targetMemberId: targetMemberId };
            letters.push(nl);
            saveLetters();
            const targetName = targetMemberId ? (groupMembers.find(m => m.id === targetMemberId)?.name || 'ta') : (profile
                .mengNick || 'ta');
            alert(`💌 信已寄给 ${targetName}！预计 ${delay.toFixed(1)} 小时后回信`);
            processAllPendingLetters(); return true;
        }

        function generateReplyMessages(member = null, letterSentences = []) {
            let textPool = member ? getMemberEffectiveTextPool(member) : wordCardList;
            const pool = [];
            if (textPool.length > 0) pool.push(...textPool.map(t => ({ type: 'text', val: t })));
            if (emojiCardList.length > 0) pool.push(...emojiCardList.map(e => ({ type: 'text', val: e })));
            if (pool.length === 0) return [{ type: 'text', val: "💌 你的信我收到了。" }];

            const allText = letterSentences.join(' ');
            const words = allText.replace(/[，。！？、；：\s]/g, '').split('').filter(c => c.length > 0);
            const keywords = words.filter((c, i) => i < 10);
            const matchedReplies = [];
            if (keywords.length > 0) {
                textPool.forEach(item => {
                    if (keywords.some(kw => item.includes(kw))) {
                        matchedReplies.push(item);
                    }
                });
            }
            const useMatched = matchedReplies.length > 0 && Math.random() < 0.3;

            const cnt = Math.floor(Math.random() * 13) + 3;
            const res = [];
            if (useMatched) {
                const matchedCount = Math.min(3, matchedReplies.length, cnt);
                for (let i = 0; i < matchedCount; i++) {
                    const replyContent = matchedReplies[i % matchedReplies.length];
                    res.push({ type: 'text', content: replyContent, senderName: member ? member.name : (profile.mengNick || 'ta') });
                }
            }
            for (let i = res.length; i < cnt; i++) {
                const r = pool[Math.floor(Math.random() * pool.length)];
                res.push({ type: r.type, content: r.val });
            }
            return res;
        }
        async function processLetterReply(letter) {
            if (letter.status !== 'pending' || Date.now() < letter.dueTime) return;
            let targetMember = null;
            if (letter.targetMemberId && groupChatEnabled) {
                targetMember = groupMembers.find(m => m.id === letter.targetMemberId);
            }
            letter.status = 'completed';
            letter.replyMessages = generateReplyMessages(targetMember, letter.sentences);
            letter.replyTime = Date.now();
            saveLetters();

            if (notificationEnabled && "Notification" in window && Notification.permission === "granted") {
                const senderName = targetMember ? targetMember.name : (profile.mengNick || 'ta');
                const replyCount = letter.replyMessages?.length || 0;
                const body = replyCount > 0 ?
                    `💌 ${senderName} 给你回了 ${replyCount} 条消息，快去看看` :
                    `💌 ${senderName} 的回信到了`;
                try {
                    new Notification(`📬 手写信回信`, {
                        body: body,
                        icon: targetMember?.avatar || profile.mengAvatar || defaultAvatar()
                    });
                } catch (e) {}
            }

            checkPuzzleConditions();
        }

                            overlay.style.display = 'flex'; } } });
                overlay.addEventListener('click', () => { overlay.style.display = 'none'; }); })();
            const splash = document.getElementById('splashOverlay'),
                sbtn = document.getElementById('splashEnterBtn'); if (splash && sbtn) { sbtn.addEventListener('click', () => {
                    splash.classList.add('exit');
                    setTimeout(() => splash.classList.add('hidden-splash'), 800); }); }
            const pc = document.getElementById('splashParticles'); if (pc) { const frag = document.createDocumentFragment(); for (
                    let i = 0; i < 22; i++) { const dot = document.createElement('div');
                    dot.className = 'splash-particle'; const s = 2 + Math.random() * 5;
                    dot.style.width = s + 'px';
                    dot.style.height = s + 'px';
                    dot.style.left = (Math.random() * 90) + '%';
                    dot.style.bottom = -(Math.random() * 40) + 'px';
                    dot.style.animationDuration = (8 + Math.random() * 16) + 's';
                    dot.style.animationDelay = (Math.random() * 14) + 's';
                    dot.style.background =
                        `rgba(${170+Math.random()*50},${130+Math.random()*40},${210+Math.random()*35},${0.35+Math.random()*0.55})`;
                    dot.style.boxShadow =
                        `0 0 ${4+Math.random()*8}px rgba(${170+Math.random()*40},${135+Math.random()*30},${210+Math.random()*30},${0.4+Math.random()*0.5})`;
                    frag.appendChild(dot); }
                pc.appendChild(frag); } };
    </script>
</body>
</html>
